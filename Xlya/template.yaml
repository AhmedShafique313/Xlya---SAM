AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Xlya SAM Root Template

Resources:
  IAMStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: IAM/template.yaml

  DynamoDBStack:
    Type: AWS::Serverless::Application
    DependsOn:
      - IAMStack
    Properties:
      Location: dynamodb/template.yaml

  AuthFeature:
    Type: AWS::Serverless::Application
    DependsOn:
      - IAMStack
      - DynamoDBStack
    Properties:
      Location: auth/template.yaml

  CognitoStack:
    Type: AWS::Serverless::Application
    # DependsOn:
    #   - AuthFeature
    Properties:
      Location: cognito/template.yaml

  OnboardingFeature:
    Type: AWS::Serverless::Application
    DependsOn:
      - IAMStack
      - DynamoDBStack
    Properties:
      Location: onboarding/template.yaml

  ApiGatewayFeature:
    Type: AWS::Serverless::Application
    DependsOn:
      - IAMStack
      - OnboardingFeature
    Properties:
      Location: api/template.yaml

  ProfileFeature:
    Type: AWS::Serverless::Application
    DependsOn:
      - IAMStack
      - DynamoDBStack
    Properties:
      Location: profile/template.yaml

  DashboardFeature:
    Type: AWS::Serverless::Application
    DependsOn:
      - IAMStack
      - DynamoDBStack
      - LayersStack
    Properties:
      Location: dashboard/template.yaml

  LayersStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: layers/template.yaml

  SEOAEOGEOFeature:
    Type: AWS::Serverless::Application
    DependsOn:
      - IAMStack
      - DynamoDBStack
      - LayersStack
      - S3Stack
    Properties:
      Location: seo-aeo-geo-statemachine/template.yaml
      Parameters:
        S3BucketName: !GetAtt S3Stack.Outputs.XlyaBucketName

  S3Stack:
    Type: AWS::Serverless::Application
    Properties:
      Location: s3/template.yaml

  StateMachinesFeature:
    Type: AWS::Serverless::Application
    Properties:
      Location: functions/template.yaml

  MediMindFeature:
    Type: AWS::Serverless::Application
    DependsOn:
      - IAMStack
      - DynamoDBStack
      - LayersStack
      - S3Stack
    Properties:
      Location: medimind/template.yaml

Outputs:
  IAMStackOutput:
    Description: Outputs from IAM stack
    Value: !Ref IAMStack

  DynamoDBStackOutput:
    Description: Outputs from dynamodb stack
    Value: !Ref DynamoDBStack

  AuthFeatureOutput:
    Description: Outputs from Auth AuthFeature
    Value: !Ref AuthFeature

  CognitoStackOutput:
    Description: Outputs from cognito stack
    Value: !Ref CognitoStack

  OnboardingFeatureOutput:
    Description: Outputs from Onboarding Feature
    Value: !Ref OnboardingFeature

  ApiGatewayFeatureOutput:
    Description: Outputs from API Gateway feature
    Value: !Ref ApiGatewayFeature

  ProfileFeatureOutput:
    Description: Outputs from Profile Feature
    Value: !Ref ProfileFeature

  DashboardFeatureOutput:
    Description: Outputs from Dashboard Feature
    Value: !Ref DashboardFeature

  LayersStackOutput:
    Description: Outputs from layers stack
    Value: !Ref LayersStack

  SEOAEOGEOFeatureOutput:
    Description: Outputs from SEOAEOGEO feature
    Value: !Ref SEOAEOGEOFeature

  S3StackOutput:
    Description: Outputs from S3 stack
    Value: !Ref S3Stack

  StateMachinesFeatureOutput:
    Description: Outputs from state machine functions
    Value: !Ref StateMachinesFeature

  MediMindFeatureOutput:
    Description: Outputs from MediMind Feature
    Value: !Ref MediMindFeature