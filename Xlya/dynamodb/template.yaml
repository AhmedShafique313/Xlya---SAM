AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Xlya DynamoDB Structure

Resources:
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: users-table
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: cognito_sub
          AttributeType: S
      KeySchema:
        - AttributeName: cognito_sub
          KeyType: HASH

  OnboardingQuestionaireTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: users-onboarding-questionaire-table
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: cognito_sub
          AttributeType: S
        - AttributeName: user_type
          AttributeType: S
      KeySchema:
        - AttributeName: cognito_sub
          KeyType: HASH
        - AttributeName: user_type
          KeyType: RANGE

  SEOAEOGEOAnalyzerTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: seo-aeo-geo-analyzer-table
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: task_id
          AttributeType: S
        - AttributeName: cognito_sub
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: task_id
          KeyType: HASH
        - AttributeName: cognito_sub
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: cognito_sub-index
          KeySchema:
            - AttributeName: cognito_sub
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

Outputs:
  UsersTableName:
    Value: !Ref UsersTable
    Export:
      Name: Xlya-UsersTableName

  OnboardingQuestionaireTableName:
    Value: !Ref OnboardingQuestionaireTable
    Export:
      Name: Xlya-OnboardingQuestionaireTableName

  SEOAEOGEOAnalyzerTableName:
    Value: !Ref SEOAEOGEOAnalyzerTable
    Export:
      Name: Xlya-SEOAEOGEOAnalyzerTableName